<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <foreignObject width="100%" height="100%">
    <html xmlns="http://www.w3.org/1999/xhtml">
      <head>
        <title>EduLearn</title>
        <style>
        /* <![CDATA[ */
          :root { --bg: #050505; --accent: #3b82f6; --text: #ffffff; }
          html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #050505; color: white; 
            font-family: sans-serif; display: flex; 
            align-items: center; justify-content: center;
          }
          .logo-text {
            font-size: 5rem; font-weight: 900;
            background: linear-gradient(to bottom right, #fff, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
          }
          .search-box input {
            width: 400px; padding: 15px; border-radius: 10px;
            border: 1px solid #333; background: #111; color: white;
          }
        /* ]]> */
        </style>
      </head>
      <body>
        <div style="text-align: center;">
          <h1 class="logo-text">edulearn</h1>
          <div class="search-box">
            <input type="text" placeholder="If you see this, it works!" />
          </div>
          <p style="margin-top: 20px; color: #666;">SVG Container Active</p>
        </div>

        <script src="https://cdn.jsdelivr.net/gh/vibec3der/svg@main/scram/scramjet.all.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/vibec3der/svg@main/search.js"></script>
      </body>
    </html>
  </foreignObject>
</svg>
