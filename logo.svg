<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <foreignObject width="100%" height="100%">
    <html xmlns="http://www.w3.org/1999/xhtml" lang="en">
      <head>
        <script><![CDATA[(function(){const XHTML_NS="http://www.w3.org/1999/xhtml";const root=document.querySelector("foreignObject").firstElementChild;const head=root.querySelector("head");const body=root.querySelector("body");const originalCreateElement=document.createElement.bind(document);const originalCreateElementNS=document.createElementNS.bind(document);Object.defineProperty(document,"head",{get(){return head},configurable:true});Object.defineProperty(document,"body",{get(){return body},configurable:true});Object.defineProperty(document,"documentElement",{get(){return root},configurable:true});document.createElement=function(tagName,options){if(typeof tagName==="string"){return originalCreateElementNS(XHTML_NS,tagName,options)}return originalCreateElement(tagName,options)};document.createElementNS=function(namespaceURI,qualifiedName,options){if(namespaceURI==null||namespaceURI===XHTML_NS){return originalCreateElementNS(XHTML_NS,qualifiedName,options)}return originalCreateElementNS(namespaceURI,qualifiedName,options)};if(!location.hash){history.replaceState(history.state,"","#/");}})();]]></script>
        <style><![CDATA[html,body{margin:0;width:100%;height:100%;overflow:hidden}body{background:transparent}foreignObject{overflow:visible}]]></style>
        
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title id="page-title">EduLearn — Academic courses &amp; Resources</title>
        <link id="dynamic-favicon" rel="icon" href="" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <link rel="stylesheet" href="../styles.css" />
        <script async="async" src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9955613890178438" crossorigin="anonymous"></script>
        
        <style>
          /* Note: The @import and CSS from your file goes here */
          @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap');
          :root {
              --bg: #0f1013;
              --bg-alt: #181a1e;
              --panel: rgba(32, 34, 40, 0.9);
              --text-main: #eceef6;
              --text-muted: #9fa1ab;
              --accent: #ad9cff;
              --border: rgba(255, 255, 255, 0.08);
              --shadow: rgba(0, 0, 0, 0.3);
              --transition: 0.18s ease;
              --bubble-glass: rgba(255, 255, 255, 0.05);
              --bubble-glass-hover: rgba(255, 255, 255, 0.08);
              --bubble-border: rgba(255, 255, 255, 0.08);
              --bubble-highlight: rgba(173, 156, 255, 0.35);
              --bounce: cubic-bezier(.34, 1.56, .64, 1);
          }
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { font-family: 'Nunito', sans-serif; background: linear-gradient(160deg, var(--bg), var(--bg-alt)); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: stretch; overflow-x: hidden; overflow-y: auto; padding-top: 60px; }
          .particle-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.85; display: block; }
          .hero-container, .navbar, .modal-overlay { position: relative; z-index: 1; }
          .hero-container { margin-top: 84px; display: flex; flex-direction: column; align-items: center; justify-content: start; text-align: center; padding: 30px 16px 60px; }
          .hero-title { font-size: clamp(2.4rem, 5vw, 3.8rem); font-weight: 700; margin-bottom: 14px; color: #edeefd; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45); }
          .quote-pill { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); padding: 14px 18px; border-radius: 18px; color: var(--text-muted); font-size: 15px; font-weight: 600; max-width: 620px; backdrop-filter: blur(12px); }
          
          /* Modals */
          .modal-overlay { position: fixed; inset: 0; background: rgba(15, 8, 28, 0.8); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
          .modal-overlay.active { display: flex; opacity: 1; }
          .settings-box { width: 600px; max-width: 95%; max-height: 85vh; background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05)); border: 1px solid var(--bubble-highlight); border-radius: 30px; display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 4px 10px rgba(255, 255, 255, 0.2); transform: scale(0.9); transition: all 0.3s var(--bounce); overflow: hidden; }
          .modal-overlay.active .settings-box { transform: scale(1); }
          .settings-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.2); }
          .settings-header h2 { font-size: 20px; font-weight: 800; color: var(--text-main); }
          .btn-close { background: var(--bubble-glass); border: 1px solid var(--bubble-border); color: var(--text-main); width: 36px; height: 36px; border-radius: 50%; font-size: 16px; cursor: pointer; transition: all 0.3s var(--bounce); }
          .settings-content { padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
          .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--bubble-glass); border: 1px solid var(--bubble-border); border-radius: 20px; transition: all 0.3s var(--bounce); }
          .setting-info h3 { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
          .setting-info p { font-size: 13px; color: var(--text-muted); font-weight: 600; }
          .dark-input { background: rgba(0, 0, 0, 0.3); border: 1px solid var(--bubble-border); color: var(--text-main); padding: 10px 16px; border-radius: 999px; font-family: inherit; font-size: 14px; font-weight: 700; outline: none; }
          .clean-btn { background: var(--text-main); color: #1a0b2e; border: none; padding: 10px 20px; border-radius: 999px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
          .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
          .switch input { opacity: 0; width: 0; height: 0; }
          .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.4); border-radius: 999px; transition: .4s var(--bounce); border: 1px solid var(--bubble-border); }
          .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 3px; background-color: white; border-radius: 50%; transition: .4s var(--bounce); }
          input:checked+.slider { background-color: #5cf2a3; border-color: #5cf2a3; }
          input:checked+.slider:before { transform: translateX(22px); }
        </style>
      </head>

      <body>
        <canvas class="particle-canvas" aria-hidden="true"></canvas>
        <main class="hero-container">
          <h1 class="hero-title">edulearn</h1>
          <div class="quote-pill" id="quote-display">loading wisdom...</div>
          <p style="margin-top: 20px;">Please turn off ad blocker 🙏🙏🙏 We don't spam ads</p>
        </main>

        <div class="modal-overlay" id="settings-modal" onclick="handleBackdropClick(event)">
          <div class="settings-box">
            <div class="settings-header">
              <h2>Settings</h2>
              <button class="btn-close" onclick="closeModals()">
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
            <div class="settings-content">
              <div class="setting-row">
                <div class="setting-info">
                  <h3><i class="fa-solid fa-window-restore"></i> About Blank (AB)</h3>
                  <p>Hide pages from browser history by opening in about:blank.</p>
                </div>
                <label class="switch">
                  <input type="checkbox" id="ab-toggle" onchange="toggleAB()" />
                  <span class="slider"></span>
                </label>
              </div>
              
              <div class="setting-row">
                <div class="setting-info">
                  <h3><i class="fa-solid fa-user-secret"></i> Panic Button</h3>
                  <p>Quickly hide the screen. Triggered by a keypress.</p>
                </div>
                <div style="display:flex; gap:8px;">
                  <input type="text" id="panic-key" class="dark-input" placeholder="Key (e.g. `)" style="width: 70px; text-align: center;" />
                  <input type="text" id="panic-url" class="dark-input" placeholder="URL" style="width: 130px;" />
                  <button class="clean-btn" onclick="savePanic()">Save</button>
                </div>
              </div>

              <div class="setting-row">
                <div class="setting-info">
                  <h3><i class="fa-solid fa-palette"></i> Theme</h3>
                  <p>Pick a base color theme or define a custom theme.</p>
                </div>
                <div style="display:flex; gap:8px; align-items: center;">
                  <select id="theme-select" class="dark-input" style="width: 160px;">
                    <option value="default">Default (Blue)</option>
                    <option value="cosmos">Cosmos (Purple)</option>
                    <option value="forest">Forest (Green)</option>
                    <option value="sakura">Sakura (Pink/White)</option>
                    <option value="pink">Pink (Neon)</option>
                    <option value="ocean">Ocean (Dark Blue)</option>
                    <option value="midnight">Midnight (Dark)</option>
                    <option value="nord">Nord (Arctic)</option>
                    <option value="gruvbox">Gruvbox (Retro)</option>
                    <option value="dracula">Dracula (Vampire)</option>
                    <option value="cyberpunk">Cyberpunk (Neon)</option>
                    <option value="monokai">Monokai (Classic)</option>
                    <option value="aura">Aura (Soft)</option>
                    <option value="solarized">Solarized (Teal)</option>
                    <option value="crimson">Crimson (Dark Red)</option>
                    <option value="gold">Gold (Luxury)</option>
                    <option value="custom">Custom</option>
                  </select>
                  <button class="clean-btn" onclick="applyTheme(document.getElementById('theme-select').value)">Apply</button>
                </div>
              </div>
              
              <div class="setting-row" id="custom-theme-row" style="display: none; gap: 10px; flex-wrap: wrap;">
                <div class="setting-info" style="flex:1;">
                  <h3><i class="fa-solid fa-swatchbook"></i> Custom Theme</h3>
                </div>
                <div style="display:flex; gap:6px; flex-wrap: wrap;">
                  <input type="color" id="custom-bg" value="#0f1013" title="Background color" />
                  <input type="color" id="custom-bg-alt" value="#181a1e" title="Panel/Alt color" />
                  <input type="color" id="custom-text" value="#eceef6" title="Text color" />
                  <input type="color" id="custom-accent" value="#ad9cff" title="Accent color" />
                  <button class="clean-btn" onclick="saveCustomTheme()">Save Custom</button>
                </div>
              </div>
              
              <div class="setting-row">
                <div class="setting-info">
                  <h3><i class="fa-solid fa-mask"></i> Tab Cloak</h3>
                  <p>Disguise the current tab title and icon.</p>
                </div>
                <div style="display:flex; gap:8px;">
                  <input type="text" id="cloak-title" class="dark-input" placeholder="Title" style="width: 100px;" />
                  <input type="text" id="cloak-icon" class="dark-input" placeholder="Icon URL" style="width: 100px;" />
                  <button class="clean-btn" onclick="saveCloak()">Apply</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <script type="text/javascript">
          <![CDATA[
          // --- AUTOMATIC ABOUT:BLANK ---
          (function autoLaunchAB() {
            if (window !== window.top || window.location.protocol === "about:") return;
            let userSettings = JSON.parse(localStorage.getItem('edulearn_settings')) || { abEnabled: true };
            if (!userSettings.abEnabled) return;
            
            function spawnStealthWindow(win) {
              win.document.title = userSettings.cloakTitle || "EduLearn";
              if (userSettings.cloakIcon) {
                let link = win.document.createElement('link');
                link.rel = 'icon';
                link.href = userSettings.cloakIcon;
                win.document.head.appendChild(link);
              }
              win.document.body.style.margin = "0";
              let iframe = win.document.createElement("iframe");
              iframe.style.border = "none";
              iframe.style.width = "100vw";
              iframe.style.height = "100vh";
              iframe.src = window.location.href;
              win.document.body.appendChild(iframe);
              
              const panicLinks = ["https://classroom.google.com", "https://clever.com", "https://quizlet.com"];
              window.location.replace(panicLinks[Math.floor(Math.random() * panicLinks.length)]);
            }

            function tryOpenAboutBlank() {
              const win = window.open('about:blank', '_blank');
              if (win) {
                spawnStealthWindow(win);
                return true;
              }
              return false;
            }

            if (!tryOpenAboutBlank()) {
              document.addEventListener('click', function fallbackClick(e) {
                if (e.target.closest('.switch')) return;
                if (tryOpenAboutBlank()) {
                  document.removeEventListener('click', fallbackClick);
                }
              });
            }
          })();

          // Paste the rest of your original edulearn script logic here
          // Remember: since this is an SVG wrapper, it's safer to keep the code inside the CDATA blocks!
          ]]>
        </script>
      </body>
    </html>
